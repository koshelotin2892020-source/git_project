<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Учебная система{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
        }
        
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 20px;
        }
        
        header {
            background: #35424a;
            color: white;
            padding: 1rem 0;
            margin-bottom: 2rem;
        }
        
        header h1 {
            margin: 0;
            padding: 0;
        }
        
        nav {
            margin-top: 10px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            margin-right: 10px;
            display: inline-block;
        }
        
        nav a:hover {
            background: #e8491d;
            border-radius: 5px;
        }
        
        .messages {
            margin: 20px 0;
        }
        
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 2rem;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #35424a;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #e8491d;
        }
        
        .btn-danger {
            background: #dc3545;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .btn-success {
            background: #28a745;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table, th, td {
            border: 1px solid #ddd;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
        }
        
        th {
            background-color: #35424a;
            color: white;
        }
        
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        footer {
            background: #35424a;
            color: white;
            text-align: center;
            padding: 1rem 0;
            margin-top: 2rem;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
        
        .stat-card h3 {
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 2em;
            color: #e8491d;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>📚 Учебная система</h1>
            <nav>
                <a href="{% url 'schedule:index' %}">Главная</a>
                <a href="{% url 'schedule:teacher_list' %}">Преподаватели</a>
                <a href="{% url 'schedule:course_list' %}">Курсы</a>
                <a href="{% url 'schedule:student_list' %}">Студенты</a>
                <a href="{% url 'schedule:info' %}">О системе</a>
            </nav>
        </div>
    </header>
    
    <div class="container">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{% if message.tags %}{{ message.tags }}{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 Учебная система. Все права защищены.</p>
        </div>
    </footer>
</body>
</html>
