{% extends 'schedule/base.html' %}

{% block title %}{% if student %}Редактировать{% else %}Создать{% endif %} студента{% endblock %}

{% block content %}
<h2>{% if student %}✏️ Редактировать студента{% else %}➕ Создать студента{% endif %}</h2>

<form method="post">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="first_name">Имя:</label>
        <input type="text" id="first_name" name="first_name" value="{{ student.first_name|default:'' }}" required>
    </div>
    
    <div class="form-group">
        <label for="last_name">Фамилия:</label>
        <input type="text" id="last_name" name="last_name" value="{{ student.last_name|default:'' }}" required>
    </div>
    
    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ student.email|default:'' }}" required>
    </div>
    
    <div class="form-group">
        <label for="phone">Телефон:</label>
        <input type="text" id="phone" name="phone" value="{{ student.phone|default:'' }}">
    </div>
    
    <div class="form-group">
        <label for="date_of_birth">Дата рождения:</label>
        <input type="date" id="date_of_birth" name="date_of_birth" value="{{ student.date_of_birth|default:'' }}">
    </div>
    
    <button type="submit" class="btn">💾 Сохранить</button>
    <a href="{% url 'schedule:student_list' %}" class="btn">Отмена</a>
</form>
{% endblock %}
